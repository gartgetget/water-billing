<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <section>
        <div class="landing">
            <h1>Welcome to Water Billing</h1>
            <p>Manage your water billing easily and efficiently.</p>
            <div class="buttons">
            <button class="button Button1">Contact Support</button>
            <button class="button Button2">View My Bill</button>
            </div>
        </div>
   </section>
   <section>
    <div class="acc">
       <h1>John Doe</h1>
       <button class="button Button3">Logout</button>
    </div>
   </section>
   <section>
        <div class="graph">
                <h1>Billing Overview</h1>
                <p>Your current water usage and billing metrics.</p>
                <div>
                    <button class="button Button1">Report</button>
                    <button class="button Button2">Refresh Data</button>
                </div>
                <div class="chart">
                    <canvas id="myChart" style="width: 300px; height: 100px;"></canvas>
                </div>
        </div>
    </section>
    <section class="mid">
        <div class="left">
            <h1>Recent transactions</h1>
            <p>View your recent water billing transactions.</p>
            <button class="button Button4 ">View All</button>
        <div class="right">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2023-10-01</td>
                        <td>$50.00</td>
                        <td>Paid</td>
                    </tr>
                    <tr>
                        <td>2023-09-15</td>
                        <td>$45.00</td>
                        <td>Pending</td>
                    </tr>
                </tbody>
            </table>
        </div>
        </div>
        
    </section>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
    <script src="chart.js"></script>
</body>
</html>
